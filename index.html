<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LuminaCMS</title>
    <style>:root{
      --bg:#F5F5F7;
      --card:#FFFFFF;
      --fg:#111111;
      --muted:#6e6e73;
      --accent:#0071e3;
      --ring:rgba(0,0,0,0.06);
    }
    @media (prefers-color-scheme: dark){
      :root{
        --bg:#000000;
        --card:#1c1c1e;
        --fg:#f5f5f7;
        --muted:#98989d;
        --accent:#0a84ff;
        --ring:rgba(255,255,255,0.10);
      }
    }
    *{box-sizing:border-box}
    html,body{min-height:100%}
    body{
      margin:0;
      padding:24px 16px 48px;
      background:var(--bg);
      color:var(--fg);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,"Helvetica Neue",Helvetica,Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    .shell{max-width:960px;margin:0 auto}
    .nav{
      position:sticky;top:0;z-index:10;
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 18px;margin-bottom:16px;border-radius:999px;
      background:color-mix(in srgb, var(--card) 70%, transparent);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border:1px solid var(--ring);
      box-shadow:0 8px 30px rgba(0,0,0,0.08);
    }
    .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:-0.01em}
    .pill{
      font-size:12px;color:var(--muted);
      padding:6px 10px;border-radius:999px;
      border:1px solid var(--ring);
      background:color-mix(in srgb, var(--card) 85%, transparent);
    }
    .hero{margin:18px 0 22px}
    .hero h1{margin:0;font-size:34px;letter-spacing:-0.03em}
    .hero p{margin:10px 0 0;color:var(--muted);line-height:1.6}
    .list{display:grid;gap:12px}
    .card{
      display:block;text-decoration:none;color:inherit;
      padding:16px 16px 14px;border-radius:22px;
      background:var(--card);
      border:1px solid var(--ring);
      box-shadow:0 18px 40px rgba(0,0,0,0.06);
      transition:transform .12s ease, box-shadow .12s ease;
    }
    .card:hover{transform:translateY(-1px);box-shadow:0 22px 55px rgba(0,0,0,0.10)}
    .title{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .meta{margin-top:8px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
    .dot{width:4px;height:4px;border-radius:999px;background:currentColor;opacity:.35}
    .empty{
      padding:18px 16px;border-radius:22px;
      background:var(--card);
      border:1px solid var(--ring);
      color:var(--muted);
      text-align:center;
    }
    .footer{margin-top:18px;color:var(--muted);font-size:12px;text-align:center}
    .footer a{color:var(--accent);text-decoration:none}
    .footer a:hover{text-decoration:underline}</style>
  </head>
