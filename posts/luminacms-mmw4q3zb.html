  <head>
    <meta charset="utf-8" />

    <style>
:root {
      --bg-body: #F5F5F7;
      --bg-card: #FFFFFF;
      --fg-primary: #111111;
      --fg-secondary: #6e6e73;
      --accent: #0071e3;
      --radius-card: 24px;
      --shadow-card: 0 18px 40px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px 16px 40px;
      background: var(--bg-body);
      color: var(--fg-primary);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
        system-ui, "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .lcms-shell { max-width: 960px; margin: 0 auto; }
    .lcms-nav {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px; margin-bottom: 16px; border-radius: 999px;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    .lcms-nav-title {
      font-size: 13px; font-weight: 600;
      letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--fg-secondary);
    }
    .lcms-nav-dot {
      width: 8px; height: 8px; border-radius: 999px;
      background: linear-gradient(135deg, #34C759, #0A84FF);
      box-shadow: 0 0 0 3px rgba(52,199,89,0.35);
    }
    .lcms-card {
      max-width: 800px; margin: 0 auto;
      border-radius: var(--radius-card);
      background: var(--bg-card);
      box-shadow: var(--shadow-card);
      padding: 32px 28px 36px;
    }
    @media (min-width: 768px) { .lcms-card { padding: 40px 40px 44px; } }
    .lcms-meta {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--fg-secondary); margin-bottom: 12px;
    }
    .lcms-meta-dot {
      width: 4px; height: 4px; border-radius: 999px;
      background: var(--fg-secondary); opacity: 0.4;
    }
    .lcms-title { margin: 0 0 18px; font-size: 28px; line-height: 1.22; letter-spacing: -0.02em; }
    @media (min-width: 768px) { .lcms-title { font-size: 32px; } }
    .lcms-content { font-size: 15px; line-height: 1.7; color: var(--fg-primary); }
    .lcms-content p { margin: 0 0 1.1em; }
    .lcms-content h2, .lcms-content h3 { margin: 1.6em 0 0.7em; letter-spacing: -0.01em; }
    .lcms-content a { color: var(--accent); text-decoration: none; }
    .lcms-content a:hover { text-decoration: underline; }
html, body { min-height: 100%; }
    body { min-height: 100vh; background-color: var(--bg-body); }

    </style>

<script>(function(){var ctn=document.getElementById('pc3o2vvx');var cv=document.getElementById('pc3o2vvx-cv');if(!ctn||!cv)return;var cols=["#f8fafc","#f1f5f9","#cbd5e1"],gap=5,spd=35*0.001,px=[],aid=null,ctx=null;function Px(x,y,c,d){this.x=x;this.y=y;this.color=c;this.sp=(Math.random()*0.8+0.1)*spd;this.sz=0;this.ss=Math.random()*0.4;this.mn=0.5;this.mx=Math.random()*1.5+0.5;this.delay=d;this.cnt=0;this.cs=Math.random()*4+(cv.width+cv.height)*0.01;this.idle=false;this.rev=false;this.shim=false;}Px.prototype.draw=function(){var o=1-this.sz*0.5;ctx.fillStyle=this.color;ctx.fillRect(this.x+o,this.y+o,this.sz,this.sz);};Px.prototype.appear=function(){this.idle=false;if(this.cnt<=this.delay){this.cnt+=this.cs;return;}if(this.sz>=this.mx)this.shim=true;if(this.shim)this.shimmer();else this.sz+=this.ss;this.draw();};Px.prototype.disappear=function(){this.shim=false;this.cnt=0;if(this.sz<=0){this.idle=true;return;}this.sz-=0.1;this.draw();};Px.prototype.shimmer=function(){if(this.sz>=this.mx)this.rev=true;else if(this.sz<=this.mn)this.rev=false;if(this.rev)this.sz-=this.sp;else this.sz+=this.sp;};function init(){ctx=cv.getContext('2d');cv.width=ctn.offsetWidth;cv.height=ctn.offsetHeight;px=[];for(var x=0;x<cv.width;x+=gap){for(var y=0;y<cv.height;y+=gap){var c=cols[Math.floor(Math.random()*cols.length)];var dx=x-cv.width/2,dy=y-cv.height/2;px.push(new Px(x,y,c,Math.sqrt(dx*dx+dy*dy)));}};}function step(fn){ctx.clearRect(0,0,cv.width,cv.height);var done=true;for(var i=0;i<px.length;i++){px[i][fn]();if(!px[i].idle)done=false;}if(!done)aid=requestAnimationFrame(function(){step(fn);});}function go(fn){if(aid)cancelAnimationFrame(aid);aid=requestAnimationFrame(function(){step(fn);});}requestAnimationFrame(function(){init();ctn.addEventListener('mouseenter',function(){go('appear');});ctn.addEventListener('mouseleave',function(){go('disappear');});});})();</script>
