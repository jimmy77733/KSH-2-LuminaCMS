    <style>
/* 確保版型/寬度跟其他模板一致 */
    :root {
      --bg-body: #F5F5F7;
      --bg-card: #FFFFFF;
      --fg-primary: #111111;
      --fg-secondary: #6e6e73;
      --accent: #0071e3;
      --radius-card: 24px;
      --shadow-card: 0 18px 40px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px 16px 40px;
      background: var(--bg-body);
      color: var(--fg-primary);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
        system-ui, "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .lcms-shell { max-width: 960px; margin: 0 auto; }
    .lcms-nav {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px; margin-bottom: 16px; border-radius: 999px;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    .lcms-nav-title {
      font-size: 13px; font-weight: 600;
      letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--fg-secondary);
    }
    .lcms-nav-dot {
      width: 8px; height: 8px; border-radius: 999px;
      background: linear-gradient(135deg, #34C759, #0A84FF);
      box-shadow: 0 0 0 3px rgba(52,199,89,0.35);
    }
    .lcms-card {
      max-width: 800px; margin: 0 auto;
      border-radius: var(--radius-card);
      background: var(--bg-card);
      box-shadow: var(--shadow-card);
      padding: 32px 28px 36px;
    }
    @media (min-width: 768px) { .lcms-card { padding: 40px 40px 44px; } }
    .lcms-meta {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--fg-secondary); margin-bottom: 12px;
    }
    .lcms-meta-dot {
      width: 4px; height: 4px; border-radius: 999px;
      background: var(--fg-secondary); opacity: 0.4;
    }
    .lcms-title { margin: 0 0 18px; font-size: 28px; line-height: 1.22; letter-spacing: -0.02em; }
    @media (min-width: 768px) { .lcms-title { font-size: 32px; } }
    .lcms-content { font-size: 15px; line-height: 1.7; color: var(--fg-primary); }
    .lcms-content p { margin: 0 0 1.1em; }
    .lcms-content h2, .lcms-content h3 { margin: 1.6em 0 0.7em; letter-spacing: -0.01em; }
    .lcms-content a { color: var(--accent); text-decoration: none; }
    .lcms-content a:hover { text-decoration: underline; }

/* Light (default): 白底 + 終端機視窗卡片 */
    :root{
      --bg-body:#f6f7fb;
      --bg-card:#0b0f17; /* terminal window */
      --fg-primary:#111111;
      --fg-secondary:#6b7280;
      --accent:#16a34a;
      --radius-card:22px;
      --shadow-card:0 18px 60px rgba(0,0,0,0.10);
    }

    body{
      background:
        radial-gradient(900px 420px at 50% 0%, rgba(22,163,74,0.10), transparent 60%),
        radial-gradient(800px 420px at 15% 20%, rgba(37,99,235,0.08), transparent 60%),
        var(--bg-body);
      background-attachment: fixed;
    }

    /* subtle scanlines / noise */
    body::before{
      content:"";
      position:fixed; inset:0;
      pointer-events:none;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.05) 0px,
          rgba(255,255,255,0.05) 1px,
          transparent 2px,
          transparent 6px
        );
      opacity:0.18;
      mix-blend-mode:overlay;
    }

    .lcms-nav{
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 8px 30px rgba(0,0,0,0.10);
      backdrop-filter: blur(18px);
    }
    .lcms-nav-title{ color: var(--fg-secondary); }
    .lcms-nav-dot{
      background: linear-gradient(135deg, #22c55e, #0ea5e9);
      box-shadow: 0 0 0 3px rgba(34,197,94,0.25);
    }

    .lcms-card{
      position: relative;
      padding-top: 52px;
      background: linear-gradient(180deg, rgba(11,15,23,0.98), rgba(7,10,15,0.96));
      border: 1px solid rgba(22,163,74,0.22);
      box-shadow: 0 30px 80px rgba(0,0,0,0.40);
      overflow: hidden;
    }
    /* Terminal window top bar */
    .lcms-card::before{
      content:"";
      position:absolute;
      left:0; right:0; top:0;
      height:46px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.00));
      border-bottom: 1px solid rgba(34,197,94,0.12);
    }
    /* 3 dots */
    .lcms-card::after{
      content:"";
      position:absolute;
      top:16px;
      left:20px;
      width:10px;height:10px;border-radius:999px;
      background:#ef4444;
      box-shadow:
        18px 0 0 #f59e0b,
        36px 0 0 #22c55e;
      opacity:0.95;
    }

    /* Monospace vibe */
    .lcms-meta{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      letter-spacing: 0.02em;
    }
    .lcms-title{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      letter-spacing: -0.01em;
    }
    .lcms-content{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    .lcms-content p{ color: rgba(229,231,235,0.92); }
    .lcms-content code{
      background: rgba(34,197,94,0.10);
      border: 1px solid rgba(34,197,94,0.18);
      padding: 0.12em 0.35em;
      border-radius: 8px;
    }

    .lcms-meta{ color: rgba(148,163,184,0.9); }
    .lcms-meta-dot{ background: var(--fg-secondary); opacity:0.45; }
    .lcms-title{ color: rgba(229,231,235,0.98); }
    .lcms-content{ color: rgba(229,231,235,0.96); }
    .lcms-content a{ color: rgba(34,197,94,0.98); }
    .lcms-content a:hover{ text-decoration: underline; }
